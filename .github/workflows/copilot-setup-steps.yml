name: "Copilot Setup Steps"

# Run automatically when this file changes (for easy validation),
# and allow manual runs from the Actions tab.
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # MUST be named `copilot-setup-steps` to be picked up by Copilot.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: "gradle"

            - name: Set up Android SDK
              uses: android-actions/setup-android@v3

            - name: Accept Android SDK licenses
              run: yes | sdkmanager --licenses || true

            - name: Install required Android SDK components
              run: |
                  sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

            - name: Make gradlew executable
              run: chmod +x ./gradlew

            - name: Pre-download Gradle dependencies
              run: ./gradlew dependencies --no-daemon
              env:
                  ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
